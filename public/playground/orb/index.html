</head>
<body>
    <!-- WebGL globe renders here -->
    <canvas id="scene" aria-hidden="true"></canvas>

    <!-- OpenGlass displacement filters are generated per-surface by glass.js and appended to
         this off-screen defs host. (https://github.com/naturaldesignapp/openglass) -->
    <svg class="lg-defs" aria-hidden="true" width="0" height="0"></svg>

    <!-- Top bar -->
    <header class="topbar">
        <a class="wordmark" href="https://felixjoy.me" aria-label="Felix Joy — home">
            <svg width="30" height="30" viewBox="0 0 49 49" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

            </svg>
        </a>
    </header>

    <!-- Intro blurb + attribution, pinned bottom-left -->
    <div class="intro">
        <p class="intro__desc">A living globe of movies. Filter, <span class="intro__cta">or hit <span class="intro__feat">Surprise me</span>.</span></p>
        <p class="intro__by">
            Made by
            <a class="intro__author" href="https://felixjoy.me" target="_blank" rel="noopener noreferrer">
                <img src="/assets/logo.svg" alt="" width="13" height="15">
                Felix Joy
            </a>
        </p>
    </div>

    <!-- Right rail: theme + view, as vertical segmented tabs -->
    <div class="rail">
        <!-- Light / Dark -->
        <div class="vseg" id="theme-seg" role="radiogroup" aria-label="Theme">
            <span class="vseg-ind"></span>
            <button class="vseg-btn" data-theme="light" type="button" role="radio" aria-checked="true" aria-label="Light mode" title="Light mode">
                <svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="currentColor"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <button class="vseg-btn" data-theme="dark" type="button" role="radio" aria-checked="false" aria-label="Dark mode" title="Dark mode">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>

        <!-- Globe view (three options). Extra experimental views are kept in the code below —
             re-enable any by un-commenting its button. -->
        <div class="vseg" id="view-seg" role="radiogroup" aria-label="Globe view">
            <span class="vseg-ind"></span>
            <button class="vseg-btn is-active" data-view="globe" type="button" role="radio" aria-checked="true" aria-label="Full globe" title="Full globe">
                <svg width="18" height="18" viewBox="0 0 24 24"><mask id="globe-grid"><rect width="24" height="24" fill="#fff"/><ellipse cx="12" cy="12" rx="3.6" ry="8.5" fill="none" stroke="#000" stroke-width="1.5"/><line x1="3.5" y1="12" x2="20.5" y2="12" stroke="#000" stroke-width="1.5"/></mask><circle cx="12" cy="12" r="8.5" fill="currentColor" mask="url(#globe-grid)"/></svg>
            </button>
            <button class="vseg-btn" data-view="near" type="button" role="radio" aria-checked="false" aria-label="Inside the globe" title="Inside the globe">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="5.2" height="5.2" rx="1.3"/><rect x="9.4" y="3" width="5.2" height="5.2" rx="1.3"/><rect x="15.8" y="3" width="5.2" height="5.2" rx="1.3"/><rect x="3" y="9.4" width="5.2" height="5.2" rx="1.3"/><rect x="9.4" y="9.4" width="5.2" height="5.2" rx="1.3"/><rect x="15.8" y="9.4" width="5.2" height="5.2" rx="1.3"/><rect x="3" y="15.8" width="5.2" height="5.2" rx="1.3"/><rect x="9.4" y="15.8" width="5.2" height="5.2" rx="1.3"/><rect x="15.8" y="15.8" width="5.2" height="5.2" rx="1.3"/></svg>
            </button>
            <button class="vseg-btn" data-view="row" type="button" role="radio" aria-checked="false" aria-label="Single row" title="Single row">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><g opacity="0.28"><rect x="3" y="3" width="5.2" height="5.2" rx="1.3"/><rect x="9.4" y="3" width="5.2" height="5.2" rx="1.3"/><rect x="15.8" y="3" width="5.2" height="5.2" rx="1.3"/></g><rect x="3" y="9.4" width="5.2" height="5.2" rx="1.3"/><rect x="9.4" y="9.4" width="5.2" height="5.2" rx="1.3"/><rect x="15.8" y="9.4" width="5.2" height="5.2" rx="1.3"/><g opacity="0.28"><rect x="3" y="15.8" width="5.2" height="5.2" rx="1.3"/><rect x="9.4" y="15.8" width="5.2" height="5.2" rx="1.3"/><rect x="15.8" y="15.8" width="5.2" height="5.2" rx="1.3"/></g></svg>
            </button>
            <!-- Hidden experimental views (kept in code; un-comment a button to re-enable it):
            <button class="vseg-btn" data-view="warp" type="button" role="radio" aria-checked="false" aria-label="Warp tunnel" title="Warp tunnel">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="3"/><rect x="7.5" y="7.5" width="9" height="9" rx="2"/><rect x="10.75" y="10.75" width="2.5" height="2.5" rx="0.8"/></svg>
            </button>
            <button class="vseg-btn" data-view="helix" type="button" role="radio" aria-checked="false" aria-label="Helix" title="Helix">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M9 3c6 3 6 6 0 9s-6 6 0 9"/><path d="M15 3c-6 3-6 6 0 9s6 6 0 9"/></svg>
            </button>
            <button class="vseg-btn" data-view="spot" type="button" role="radio" aria-checked="false" aria-label="Spotlight" title="Spotlight">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/></svg>
            </button>
            <button class="vseg-btn" data-view="tour" type="button" role="radio" aria-checked="false" aria-label="Cinematic tour" title="Cinematic tour">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M10 8.5l5 3.5-5 3.5z" fill="currentColor" stroke="none"/></svg>
            </button>
            <button class="vseg-btn" data-view="neb" type="button" role="radio" aria-checked="false" aria-label="Nebula" title="Nebula">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="8" r="1.7"/><circle cx="14.5" cy="6" r="1.1"/><circle cx="17.5" cy="11.5" r="1.9"/><circle cx="9" cy="14.5" r="1.4"/><circle cx="15.5" cy="16.5" r="1.5"/><circle cx="11.5" cy="11" r="1"/></svg>
            </button>
            -->
        </div>
    </div>

    <!-- Hover tooltip (positioned by JS) -->
    <div id="tooltip" class="tooltip" role="status" aria-live="off" hidden></div>

    <!-- Status / loading / empty pill -->
    <div id="status" class="status" role="status" aria-live="polite" hidden></div>

    <!-- Bottom controls bar -->
    <div class="controls" id="controls">
        <!-- Row 1 (filters) / Row 2 (sliders + CTA). These wrappers are display:contents on desktop
             (bar lays out exactly as before) and become two rows only on mobile. -->
        <div class="controls__row">
            <div class="seg" id="type-seg" role="tablist" aria-label="Title type">
                <span class="seg-ind" aria-hidden="true"></span>
                <button class="seg-btn is-active" data-type="all" role="tab">All</button>
                <button class="seg-btn" data-type="movie" role="tab">Movies</button>
                <button class="seg-btn" data-type="tv" role="tab">TV</button>
            </div>

            <!-- Genre + Language: React + motion/react dropdowns mount here (dropdowns.js) -->
            <div id="genre-mount" class="dd-mount"></div>
            <div id="lang-mount" class="dd-mount"></div>
        </div>

        <div class="controls__row">
            <label class="rating" aria-label="Minimum rating">
                <span class="rating-icon" aria-hidden="true">★</span>
                <input id="rating" type="range" min="0" max="8.5" step="0.5" value="0">
                <span class="rating-val" id="rating-val">Any</span>
            </label>

            <label class="count" aria-label="Number of posters">
                <svg class="count-icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
                <input id="count" type="range" min="24" max="150" step="6" value="96">
                <span class="count-val" id="count-val">96</span>
            </label>

            <button class="surprise" id="surprise" type="button" aria-label="Surprise me — refill with random gems">
                <span class="surprise-spark" aria-hidden="true"></span>
                <span class="surprise-label">Surprise me</span>
            </button>
        </div>
    </div>

    <!-- ── Right-side control panel — commented out for now (kept for revert). To restore:
         uncomment #panel-mount + the panel.js script tag, comment out the controls bar above +
         the dropdowns.js script tag, and switch the movorb.js controls wiring back. ──
    <div id="panel-mount"></div>
    -->

    <!-- Focus / lightbox: globe blurs behind, poster lifts into a liquid-glass card.
         Left = holographic poster, right = title, synopsis, where-to-watch + IMDb. -->
    <div id="focus" class="focus" hidden>
        <div class="focus__scrim" id="focus-scrim"></div>
        <div class="focus__card" role="dialog" aria-modal="true" aria-labelledby="focus-title">
            <!-- Glass panel — it clips itself AND the text inside it, so as it wipes open the text is
                 revealed by the advancing edge (not sitting there beforehand). A spacer reserves the
                 poster's column; the real poster floats on top (below) and isn't clipped. -->
            <div class="focus__panel">
                <div class="focus__poster-slot" aria-hidden="true"></div>
                <div class="focus__info">
                    <h2 class="focus__name" id="focus-title"></h2>
                    <p class="focus__sub" id="focus-sub"></p>
                    <p class="focus__synopsis" id="focus-synopsis" hidden></p>
                    <div class="focus__watch" id="focus-watch" hidden>
                        <span class="focus__watch-label">Where to watch</span>
                        <div class="focus__providers" id="focus-providers"></div>
                    </div>
                    <a class="focus__imdb" id="focus-imdb" target="_blank" rel="noopener noreferrer">
                        <span id="focus-link-label">View on IMDb</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M9 7h8v8"/></svg>
                    </a>
                </div>
            </div>
            <!-- Poster floats above the panel (not clipped) and FLIPs out of / back into the globe. -->
            <div class="focus__poster-wrap" id="focus-poster-wrap">
                <div class="focus__poster" id="focus-poster">
                    <img id="focus-img" alt="" />
                    <div class="focus__holo" aria-hidden="true"></div>
                    <div class="focus__glare" aria-hidden="true"></div>
                </div>
            </div>
            <!-- Mobile-only close button (desktop keeps the "Press Esc" hint instead). -->
            <button class="focus__close" id="focus-close" type="button" aria-label="Close">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <p class="focus__hint" aria-hidden="true">Press <kbd>Esc</kbd> to close</p>
    </div>

    <script type="module" src="movorb.js"></script>
    <script type="module" src="dropdowns.js"></script>
    <script type="module" src="glass.js"></script>
    <!-- Right-side control panel — commented out: <script type="module" src="panel.js"></script> -->
</body>
</html>
